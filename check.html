<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コンディション記録 | momo fit</title>
  <meta name="theme-color" content="#1a2b4a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="momo fit" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
  <style>
    :root {
      --main: #1a2b4a;
      --accent: #2e4a7a;
      --bg: #f4f7fc;
      --card: #ffffff;
      --text: #1a2b4a;
      --muted: #5a6b85;
      --border: #d8e0ef;
      --shadow: rgba(26, 43, 74, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: linear-gradient(165deg, #eef3fb 0%, var(--bg) 45%, #e8eef8 100%);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(4.25rem + env(safe-area-inset-bottom, 0px));
    }
    .wrap { max-width: 420px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { margin: 0 0 0.35rem; font-size: 1.15rem; font-weight: 700; color: var(--main); }
    .date-line { font-size: 0.95rem; color: var(--accent); font-weight: 600; }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.1rem 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px var(--shadow);
      border: 1px solid var(--border);
    }
    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .type-option { position: relative; cursor: pointer; }
    .type-option input { position: absolute; opacity: 0; pointer-events: none; }
    .type-face {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0.85rem 0.5rem;
      text-align: center;
      background: #fafcfe;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 4.5rem;
    }
    .type-option input:focus-visible + .type-face { outline: 2px solid var(--accent); outline-offset: 2px; }
    .type-option input:checked + .type-face {
      border-color: var(--accent);
      background: linear-gradient(180deg, #f0f4fc 0%, #e4ecf8 100%);
      box-shadow: 0 0 0 3px rgba(46, 74, 122, 0.15);
    }
    .type-emoji { font-size: 1.5rem; line-height: 1; }
    .type-label { font-size: 0.72rem; font-weight: 600; color: var(--main); line-height: 1.35; }
    .emoji-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.4rem; }
    .emoji-btn {
      flex: 1 1 calc(20% - 0.35rem);
      min-width: 56px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fafcfe;
      padding: 0.45rem 0.2rem 0.35rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      font: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .emoji-btn:active { transform: scale(0.96); }
    .emoji-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .emoji-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, #f0f4fc 0%, #e4ecf8 100%);
      box-shadow: 0 0 0 3px rgba(46, 74, 122, 0.12);
    }
    .emoji-btn .e { font-size: 1.65rem; line-height: 1; }
    .emoji-btn .t { font-size: 0.58rem; font-weight: 600; color: var(--muted); line-height: 1.2; text-align: center; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    textarea {
      width: 100%; min-height: 72px; border: 2px solid var(--border); border-radius: 12px;
      padding: 0.65rem 0.75rem; font-size: 0.95rem; font-family: inherit; resize: vertical;
      color: var(--text); background: #fafcfe;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46, 74, 122, 0.12); }
    textarea::placeholder { color: #8a96ad; }
    .submit-wrap { margin-top: 1.25rem; }
    .submit-btn {
      width: 100%; border: none; border-radius: 14px; padding: 0.95rem 1rem;
      font-size: 1rem; font-weight: 700; font-family: inherit; color: #fff;
      background: linear-gradient(180deg, var(--accent) 0%, var(--main) 100%);
      cursor: pointer; box-shadow: 0 6px 18px rgba(26, 43, 74, 0.25);
      transition: opacity 0.2s, transform 0.15s, filter 0.2s;
    }
    .submit-btn:not(:disabled):active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; filter: grayscale(0.2); }
    .success-panel { display: none; text-align: center; padding: 2rem 1rem; }
    .success-panel.show { display: block; }
    .success-panel p { margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--main); }
    #form-root.hidden { display: none; }
    .history-section { margin-top: 1.25rem; }
    .history-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0 0 0.6rem;
    }
    .history-chart {
      background: var(--card);
      border-radius: 14px;
      padding: 0.85rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 3px 14px var(--shadow);
      border: 1px solid var(--border);
    }
    .history-chart canvas { width: 100%; height: 120px; }
    .history-item {
      background: var(--card);
      border-radius: 12px;
      padding: 0.65rem 0.75rem;
      margin-bottom: 0.5rem;
      box-shadow: 0 2px 10px var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .history-emoji { font-size: 1.5rem; line-height: 1; flex-shrink: 0; width: 2.4rem; text-align: center; }
    .history-info { flex: 1; min-width: 0; }
    .history-date { font-size: 0.68rem; color: var(--muted); }
    .history-cond { font-size: 0.8rem; font-weight: 700; }
    .history-note { font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; }
    .history-empty { text-align: center; padding: 1.5rem 0.5rem; font-size: 0.82rem; color: var(--muted); }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      gap: 0.25rem;
      padding: 0.5rem 0.5rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
      background: #fff;
      box-shadow: 0 -1px 0 rgba(26, 43, 74, 0.08);
    }
    .bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      min-width: 0;
      padding: 0.3rem 0.1rem;
      text-decoration: none;
      color: var(--main);
      font-size: 0.55rem;
      font-weight: 500;
      opacity: 0.55;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .bottom-nav a svg {
      width: 1.2rem;
      height: 1.2rem;
      flex-shrink: 0;
    }
    .bottom-nav a[aria-current="page"] {
      opacity: 1;
      font-weight: 700;
    }
    .bottom-nav a[aria-current="page"] svg {
      transform: scale(1.12);
    }
    @media (max-width: 360px) {
      .emoji-btn .t { font-size: 0.52rem; }
      .type-grid { grid-template-columns: 1fr; }
    }
    .btn-pulse-link {
      display: block;
      text-align: center;
      margin-top: 0.65rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--main);
      border: 2px solid var(--accent);
      background: #fff;
      box-shadow: 0 3px 12px var(--shadow);
      transition: background 0.15s, transform 0.12s;
    }
    .btn-pulse-link:active { transform: scale(0.98); }
    .btn-pulse-link:hover { background: #f7f9fd; }
  </style>

</head>
<body>
  <div class="wrap">
    <div class="momo-app-top" role="banner">
      <div class="momo-app-top-inner">
        <div class="momo-app-top-text">
          <h1>今日のコンディション</h1>
          <p class="date-line" id="todayDate" aria-live="polite"></p>
          <p class="momo-app-top-note">
            <a href="./record.html">記録メニューへ（1日の記録・ほか）</a>
          </p>
        </div>
        <div class="momo-app-top-art" aria-hidden="true">
          <svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
            <circle cx="44" cy="44" r="34" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="8" />
            <circle cx="44" cy="44" r="22" fill="none" stroke="rgba(255,255,255,0.52)" stroke-width="8" stroke-linecap="round" stroke-dasharray="85 120" transform="rotate(-90 44 44)" />
            <circle cx="44" cy="44" r="10" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="6" stroke-linecap="round" stroke-dasharray="48 120" transform="rotate(-90 44 44)" />
          </svg>
        </div>
      </div>
    </div>
    <div id="form-root">
      <form id="checkForm" novalidate>
        <section class="card" aria-labelledby="label-pulse">
          <h2 id="label-pulse">自律神経チェック（任意）</h2>
          <p class="hint" style="margin-top:0">
            指先をカメラに当てて脈拍から<strong>今の体調の目安</strong>を出します。下のコンディション記録の<strong>前後</strong>、どちらでも構いません。
          </p>
          <a class="btn-pulse-link" href="./pulse.html?continue=check">自律神経をチェックする</a>
        </section>
        <section class="card" aria-labelledby="label-body">
          <h2 id="label-body">1. 体の調子</h2>
          <div class="emoji-row" id="bodyRow" role="group" aria-labelledby="label-body"></div>
        </section>
        <section class="card" aria-labelledby="label-mood">
          <h2 id="label-mood">2. 気分・メンタル</h2>
          <div class="emoji-row" id="moodRow" role="group" aria-labelledby="label-mood"></div>
        </section>
        <section class="card" aria-labelledby="label-note">
          <h2 id="label-note">3. 今日の一言（任意）</h2>
          <label for="note" class="visually-hidden">今日の一言</label>
          <textarea id="note" name="note" maxlength="500" placeholder="今日の気持ちを一言どうぞ（任意）" rows="3"></textarea>
        </section>
        <div class="submit-wrap">
          <button type="submit" class="submit-btn" id="submitBtn" disabled>記録する</button>
        </div>
      </form>
    </div>
    <div class="success-panel card" id="successPanel" role="status" aria-live="polite">
      <div class="momo-success-ring" aria-hidden="true">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="26" fill="none" stroke="var(--border, #d8e0ef)" stroke-width="3" />
          <path d="M18 33l10 10 18-20" fill="none" stroke="var(--accent, #2e4a7a)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <p>記録できました。今日のトレーニングも無理のない範囲で😊</p>
    </div>
    <div class="history-section" id="checkHistory"></div>
  </div>

    </a>

    </a>

      共有
    </a>

  <script src="/js/wellness-core.js"></script>
  <script>
    (function () {
      // TODO: GASを「ウェブアプリ」としてデプロイしたURLに差し替えてください
      // 例: https://script.google.com/macros/s/XXXXX/exec
      var GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyhE8IER_lrXnEJa85ap5YJdX7O8582O2gL0k89bt9MyVoRxwfcwk4XFF8DA63tUqa-Vw/exec";
      var TENANT_KEY = "eap_tenant";
      var OFFICE_KEY = "eap_office";
      function parseTenantFromUrl() {
        try {
          var q = new URLSearchParams(window.location.search).get("tenant");
          return q ? String(q).trim().slice(0, 64) : "";
        } catch (e) {
          return "";
        }
      }
      function parseOfficeFromUrl() {
        try {
          var q = new URLSearchParams(window.location.search).get("office");
          return q ? String(q).trim().slice(0, 64) : "";
        } catch (e) {
          return "";
        }
      }
      function getTenantId() {
        var fromUrl = parseTenantFromUrl();
        if (fromUrl) {
          try {
            localStorage.setItem(TENANT_KEY, fromUrl);
          } catch (e) {}
          return fromUrl;
        }
        try {
          return (localStorage.getItem(TENANT_KEY) || "").trim().slice(0, 64);
        } catch (e) {
          return "";
        }
      }
      function getOfficeId() {
        var fromUrl = parseOfficeFromUrl();
        if (fromUrl) {
          try {
            localStorage.setItem(OFFICE_KEY, fromUrl);
          } catch (e) {}
          return fromUrl;
        }
        try {
          return (localStorage.getItem(OFFICE_KEY) || "").trim().slice(0, 64);
        } catch (e) {
          return "";
        }
      }

      var LEVELS = [
        { emoji: "😩", label: "とても辛い", value: "1" },
        { emoji: "😞", label: "辛い", value: "2" },
        { emoji: "😐", label: "普通", value: "3" },
        { emoji: "😊", label: "良い", value: "4" },
        { emoji: "😄", label: "とても良い", value: "5" }
      ];
      var todayEl = document.getElementById("todayDate");
      var form = document.getElementById("checkForm");
      var formRoot = document.getElementById("form-root");
      var successPanel = document.getElementById("successPanel");
      var submitBtn = document.getElementById("submitBtn");
      var bodyRow = document.getElementById("bodyRow");
      var moodRow = document.getElementById("moodRow");
      var bodyInput = null;
      var moodInput = null;
      function formatToday() {
        var d = new Date();
        var w = ["日", "月", "火", "水", "木", "金", "土"];
        return (
          d.getFullYear() +
          "年" +
          (d.getMonth() + 1) +
          "月" +
          d.getDate() +
          "日（" +
          w[d.getDay()] +
          "）"
        );
      }
      todayEl.textContent = formatToday();
      function buildRow(container, name, hiddenHolder) {
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.required = true;
        hiddenHolder.appendChild(input);
        LEVELS.forEach(function (lv) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "emoji-btn";
          btn.setAttribute("aria-pressed", "false");
          btn.dataset.value = lv.value;
          btn.innerHTML = '<span class="e" aria-hidden="true">' + lv.emoji + '</span><span class="t">' + lv.label + "</span>";
          btn.addEventListener("click", function () {
            container.querySelectorAll(".emoji-btn").forEach(function (b) {
              b.classList.remove("selected");
              b.setAttribute("aria-pressed", "false");
            });
            btn.classList.add("selected");
            btn.setAttribute("aria-pressed", "true");
            input.value = lv.value;
            updateSubmit();
          });
          container.appendChild(btn);
        });
        return input;
      }
      var hiddenWrap = document.createElement("div");
      hiddenWrap.style.cssText = "position:absolute;width:0;height:0;overflow:hidden;clip:rect(0,0,0,0);";
      form.insertBefore(hiddenWrap, form.firstChild);
      bodyInput = buildRow(bodyRow, "bodyLevel", hiddenWrap);
      moodInput = buildRow(moodRow, "moodLevel", hiddenWrap);

      var HEALTH_CTX_LS = "eap_health_context_v1";

      function isoDateLocalCheck() {
        var d = new Date();
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }

      function fatigueFromBodyLevel(b) {
        var body = parseInt(b, 10);
        if (isNaN(body) || body < 1 || body > 5) return 3;
        return 6 - body;
      }

      function stressFromMoodLevel(m) {
        var mood = parseInt(m, 10);
        if (isNaN(mood) || mood < 1) return "不明";
        if (mood <= 2) return "high";
        if (mood === 3) return "medium";
        return "low";
      }

      function syncHealthContextFromCheck(bodyVal, moodVal, noteVal) {
        var prev = {};
        try {
          var raw = localStorage.getItem(HEALTH_CTX_LS);
          if (raw) prev = JSON.parse(raw) || {};
        } catch (e) {
          prev = {};
        }
        if (!prev || typeof prev !== "object") prev = {};

        var noteTrim = String(noteVal || "")
          .trim()
          .slice(0, 280);
        var prevNote =
          typeof prev.note === "string"
            ? prev.note
                .trim()
                .slice(0, 280)
            : "";
        var note = noteTrim || prevNote;

        var prevSleep =
          typeof prev.sleep === "string" && prev.sleep.trim()
            ? prev.sleep.trim().slice(0, 40)
            : "不明";
        var pains = Array.isArray(prev.pain) ? prev.pain : [];
        var uid =
          typeof prev.user_id === "string" ? prev.user_id.trim().slice(0, 64) : "";

        var next = {
          user_id: uid,
          date: isoDateLocalCheck(),
          fatigue: fatigueFromBodyLevel(bodyVal),
          sleep: prevSleep,
          stress: stressFromMoodLevel(moodVal),
          pain: pains,
          note: note
        };
        localStorage.setItem(HEALTH_CTX_LS, JSON.stringify(next));
      }

      function updateSubmit() {
        var bodyOk = bodyInput.value;
        var moodOk = moodInput.value;
        submitBtn.disabled = !(bodyOk && moodOk);
      }
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (submitBtn.disabled) return;
        submitBtn.disabled = true;
        submitBtn.textContent = "送信中...";

        var params = new URLSearchParams();
        params.set("formType", "health");
        params.set("submittedAt", new Date().toISOString());
        params.set("userType", "member");
        params.set("bodyLevel", bodyInput.value || "");
        params.set("moodLevel", moodInput.value || "");
        params.set("note", (document.getElementById("note").value || "").trim());
        params.set("tenantId", getTenantId());
        params.set("officeId", getOfficeId());

        fetch(GAS_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: params.toString()
        })
          .then(function (r) {
            return r
              .text()
              .then(function (t) {
                var data = null;
                try { data = JSON.parse(t); } catch (e) {}
                return { ok: r.ok, status: r.status, text: t, data: data };
              });
          })
          .then(function (data) {
            var httpOk = data && data.status >= 200 && data.status < 400;
            var jsonOk = !!(data && data.data && data.data.ok === true);
            var bodyText = (data && data.text ? String(data.text) : "").trim();
            var legacyOk = bodyText === "success" || bodyText === "ok" || bodyText === "OK";
            if (!httpOk && !jsonOk && !legacyOk) {
              throw new Error(
                "保存に失敗しました（status=" +
                  (data ? data.status : "?") +
                  "）\n" +
                  (data && data.text ? data.text : "")
              );
            }
            formRoot.classList.add("hidden");
            successPanel.classList.add("show");
            try {
              var hist = JSON.parse(localStorage.getItem("history_check") || "[]");
              if (!Array.isArray(hist)) hist = [];
              hist.push({
                date: new Date().toISOString(),
                userType: "member",
                body: bodyInput.value || "",
                mood: moodInput.value || "",
                note: (document.getElementById("note").value || "").trim()
              });
              if (hist.length > 100) hist = hist.slice(-100);
              localStorage.setItem("history_check", JSON.stringify(hist));
              syncHealthContextFromCheck(
                bodyInput.value || "",
                moodInput.value || "",
                (document.getElementById("note").value || "").trim()
              );
              if (
                window.MomoWellness &&
                typeof window.MomoWellness.mergeCheckIntoWellness === "function"
              ) {
                window.MomoWellness.mergeCheckIntoWellness(
                  bodyInput.value || "",
                  moodInput.value || "",
                  (document.getElementById("note").value || "").trim()
                );
              }
            } catch (e) {}
          })
          .catch(function (err) {
            submitBtn.disabled = false;
            submitBtn.textContent = "記録する";
            alert(
              "記録の保存に失敗しました。通信状況を確認して、もう一度お試しください。\n\n" +
                String(err && err.message ? err.message : err)
            );
          });
      });
      // --- History rendering ---
      var BODY_EMOJI = {"1":"😩","2":"😞","3":"😐","4":"😊","5":"😄"};
      var MOOD_EMOJI = {"1":"😩","2":"😞","3":"😐","4":"😊","5":"😄"};
      var LEVEL_LABEL = {"1":"とても辛い","2":"辛い","3":"普通","4":"良い","5":"とても良い"};

      function formatDateShort(iso) {
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        var w = ["日","月","火","水","木","金","土"];
        return (d.getMonth()+1)+"/"+d.getDate()+"("+w[d.getDay()]+") "+
          String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
      }

      function renderCheckHistory() {
        var el = document.getElementById("checkHistory");
        if (!el) return;
        var data = [];
        try { data = JSON.parse(localStorage.getItem("history_check") || "[]"); } catch(e){}
        if (!Array.isArray(data) || data.length === 0) {
          el.innerHTML = '<div class="history-empty">過去の記録はまだありません</div>';
          return;
        }

        var recent = data.slice(-14);
        var bodyData = recent.map(function(r){ return Number(r.body)||3; });
        var moodData = recent.map(function(r){ return Number(r.mood)||3; });
        var labels = recent.map(function(r){
          var d = new Date(r.date);
          return isNaN(d.getTime()) ? "" : (d.getMonth()+1)+"/"+d.getDate();
        });

        var html = '<p class="history-title">過去の記録</p>';
        html += '<div class="history-chart"><canvas id="checkHistCanvas" style="width:100%;height:120px"></canvas></div>';

        var reversed = data.slice().reverse().slice(0, 10);
        for (var i = 0; i < reversed.length; i++) {
          var r = reversed[i];
          var bE = BODY_EMOJI[r.body]||"😐";
          var mE = MOOD_EMOJI[r.mood]||"😐";
          html += '<div class="history-item">' +
            '<div class="history-emoji">'+bE+'</div>' +
            '<div class="history-info">' +
            '<div class="history-date">'+formatDateShort(r.date)+'</div>' +
            '<div class="history-cond">体調: '+(LEVEL_LABEL[r.body]||"")+'　メンタル: '+(LEVEL_LABEL[r.mood]||"")+" "+mE+'</div>' +
            (r.note ? '<div class="history-note">'+r.note.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>' : '') +
            '</div></div>';
        }
        el.innerHTML = html;

        // Draw chart
        setTimeout(function(){
          var canvas = document.getElementById("checkHistCanvas");
          if (!canvas) return;
          var ctx = canvas.getContext("2d");
          var dpr = window.devicePixelRatio||1;
          var rect = canvas.parentElement.getBoundingClientRect();
          canvas.width = rect.width*dpr;
          canvas.height = 120*dpr;
          ctx.scale(dpr,dpr);
          var W=rect.width, H=120;
          var pad={top:8,right:10,bottom:18,left:28};
          var cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;

          ctx.strokeStyle="#e0e6f0";ctx.lineWidth=1;
          for(var g=0;g<=4;g++){
            var gy=pad.top+cH-cH*g/4;
            ctx.beginPath();ctx.moveTo(pad.left,gy);ctx.lineTo(pad.left+cW,gy);ctx.stroke();
            ctx.fillStyle="#8a96ad";ctx.font="9px sans-serif";ctx.textAlign="right";
            ctx.fillText(String(g+1),pad.left-3,gy+3);
          }

          function drawLine(data, color) {
            if(data.length===0) return;
            ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";
            ctx.beginPath();
            for(var p=0;p<data.length;p++){
              var x=pad.left+(data.length===1?cW/2:cW*p/(data.length-1));
              var y=pad.top+cH-cH*(data[p]-1)/4;
              if(p===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
            }
            ctx.stroke();
            ctx.fillStyle=color;
            for(var q=0;q<data.length;q++){
              var dx=pad.left+(data.length===1?cW/2:cW*q/(data.length-1));
              var dy=pad.top+cH-cH*(data[q]-1)/4;
              ctx.beginPath();ctx.arc(dx,dy,3,0,Math.PI*2);ctx.fill();
            }
          }
          drawLine(bodyData, "#2e7d32");
          drawLine(moodData, "#1565c0");

          // Legend
          ctx.fillStyle="#2e7d32";ctx.fillRect(pad.left+2,1,8,8);
          ctx.fillStyle="#5a6b85";ctx.font="9px sans-serif";ctx.textAlign="left";
          ctx.fillText("体調",pad.left+13,9);
          ctx.fillStyle="#1565c0";ctx.fillRect(pad.left+42,1,8,8);
          ctx.fillStyle="#5a6b85";ctx.fillText("メンタル",pad.left+53,9);

          // X labels
          ctx.fillStyle="#8a96ad";ctx.font="8px sans-serif";ctx.textAlign="center";
          var step=Math.max(1,Math.floor(labels.length/5));
          for(var li=0;li<labels.length;li+=step){
            var lx=pad.left+(labels.length===1?cW/2:cW*li/(labels.length-1));
            ctx.fillText(labels[li],lx,H-3);
          }
        },50);
      }

      renderCheckHistory();
    })();
  </script>
  <script>
    (function () {
      var TENANT_KEY = "eap_tenant";
      var OFFICE_KEY = "eap_office";
      function slice64(s) {
        return String(s == null ? "" : s).trim().slice(0, 64);
      }
      var params;
      try {
        params = new URLSearchParams(window.location.search);
      } catch (e) {
        params = new URLSearchParams();
      }
      var tUrl = slice64(params.get("tenant"));
      var oUrl = slice64(params.get("office"));
      if (tUrl) {
        try {
          localStorage.setItem(TENANT_KEY, tUrl);
        } catch (e) {}
      }
      if (oUrl) {
        try {
          localStorage.setItem(OFFICE_KEY, oUrl);
        } catch (e) {}
      }
      var t = tUrl;
      var o = oUrl;
      if (!t) {
        try {
          t = slice64(localStorage.getItem(TENANT_KEY));
        } catch (e) {
          t = "";
        }
      }
      if (!o) {
        try {
          o = slice64(localStorage.getItem(OFFICE_KEY));
        } catch (e) {
          o = "";
        }
      }
      if (!t && !o) return;

      function isAppHtmlHref(href) {
        if (!href || /^https?:\/\//i.test(href)) return false;
        var path = href.split("#")[0].split("?")[0];
        return /\.html$/i.test(path);
      }

      document.querySelectorAll("a[href]").forEach(function (a) {
        var href = a.getAttribute("href");
        if (!isAppHtmlHref(href)) return;
        var hashI = href.indexOf("#");
        var hash = hashI >= 0 ? href.slice(hashI) : "";
        var base = hashI >= 0 ? href.slice(0, hashI) : href;
        var qI = base.indexOf("?");
        var path = qI >= 0 ? base.slice(0, qI) : base;
        var existing = qI >= 0 ? base.slice(qI + 1) : "";
        var merged = new URLSearchParams(existing);
        if (t && !merged.has("tenant")) merged.set("tenant", t);
        if (o && !merged.has("office")) merged.set("office", o);
        var mq = merged.toString();
        a.setAttribute("href", path + (mq ? "?" + mq : "") + hash);
      });
    })();
  </script>
  <script src="/pwa-register.js" defer></script>
</body>

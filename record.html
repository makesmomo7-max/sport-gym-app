<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>記録 | momo fit</title>
  <meta name="theme-color" content="#1a2b4a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="momo fit" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
  <style>
    :root {
      --main: #1a2b4a;
      --accent: #2e4a7a;
      --bg: #f4f7fc;
      --card: #ffffff;
      --text: #1a2b4a;
      --muted: #5a6b85;
      --border: #d8e0ef;
      --shadow: rgba(26, 43, 74, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: linear-gradient(165deg, #eef3fb 0%, var(--bg) 45%, #e8eef8 100%);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(4.25rem + env(safe-area-inset-bottom, 0px));
    }
    .wrap { max-width: 440px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; }
    .lead {
      margin: 0 0 1rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .choice {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      padding: 1.15rem 1.1rem;
      margin-bottom: 0.85rem;
      border: 1px solid var(--border);
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.12s, box-shadow 0.2s;
    }
    .choice:active { transform: scale(0.99); }
    .choice-primary {
      background: linear-gradient(180deg, var(--accent) 0%, var(--main) 100%);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 28px rgba(26, 43, 74, 0.28);
    }
    .choice-primary .choice-title { color: #fff; }
    .choice-primary .choice-desc { color: rgba(255, 255, 255, 0.9); }
    .choice-secondary {
      background: var(--card);
    }
    .choice-title {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .choice-desc {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.55;
      color: var(--muted);
    }
    .choice-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 0.4rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }
    .choice-secondary .choice-badge {
      background: #eef2fa;
      color: var(--accent);
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      gap: 0.25rem;
      padding: 0.5rem 0.5rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
      background: #fff;
      box-shadow: 0 -1px 0 rgba(26, 43, 74, 0.08);
    }
    .bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      min-width: 0;
      padding: 0.3rem 0.1rem;
      text-decoration: none;
      color: var(--main);
      font-size: 0.55rem;
      font-weight: 500;
      opacity: 0.55;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .bottom-nav a svg {
      width: 1.2rem;
      height: 1.2rem;
      flex-shrink: 0;
    }
    .bottom-nav a[aria-current="page"] {
      opacity: 1;
      font-weight: 700;
    }
    .bottom-nav a[aria-current="page"] svg {
      transform: scale(1.12);
    }
  </style>
  <link rel="stylesheet" href="/css/gym-app-shell.css" />
</head>
<body>
  <div class="wrap">
    <div class="momo-app-top" role="banner">
      <div class="momo-app-top-inner">
        <div class="momo-app-top-text">
          <h1>記録</h1>
          <p class="sub">記録する内容をひとつ選んでください。下の「記録」タブでもいつでもここに戻れます。</p>
        </div>
        <div class="momo-app-top-art" aria-hidden="true">
          <svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
            <circle cx="44" cy="44" r="34" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="8" />
            <circle cx="44" cy="44" r="22" fill="none" stroke="rgba(255,255,255,0.52)" stroke-width="8" stroke-linecap="round" stroke-dasharray="85 120" transform="rotate(-90 44 44)" />
            <circle cx="44" cy="44" r="10" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="6" stroke-linecap="round" stroke-dasharray="48 120" transform="rotate(-90 44 44)" />
          </svg>
        </div>
      </div>
    </div>
    <p class="lead">迷ったら<strong>1日の記録</strong>。すぐ終わらせたいときは<strong>コンディションだけ</strong>。</p>
    <a class="choice choice-primary" href="./wellness-daily.html">
      <span class="choice-badge">おすすめ</span>
      <p class="choice-title">1日の記録</p>
      <p class="choice-desc">歩数・睡眠・ストレス・トレーニング・食事などを1ページにまとめて保存します。</p>
    </a>
    <a class="choice choice-secondary" href="./check.html">
      <span class="choice-badge">かんたん</span>
      <p class="choice-title">今日のコンディションだけ</p>
      <p class="choice-desc">体と気分をタップするだけ。約1分で終わります。</p>
    </a>
  </div>
  <nav class="bottom-nav" aria-label="メインメニュー">
    <a href="./gym.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      ホーム
    </a>
    <a href="./record.html" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      記録
    </a>
    <a href="./history.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      データ
    </a>
    <a href="./chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      AI
    </a>
    <a href="./share_trainer.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      共有
    </a>
  </nav>
  <script>
    (function () {
      var TENANT_KEY = "eap_tenant";
      var OFFICE_KEY = "eap_office";
      function slice64(s) {
        return String(s == null ? "" : s).trim().slice(0, 64);
      }
      var params;
      try {
        params = new URLSearchParams(window.location.search);
      } catch (e) {
        params = new URLSearchParams();
      }
      var tUrl = slice64(params.get("tenant"));
      var oUrl = slice64(params.get("office"));
      if (tUrl) {
        try {
          localStorage.setItem(TENANT_KEY, tUrl);
        } catch (e) {}
      }
      if (oUrl) {
        try {
          localStorage.setItem(OFFICE_KEY, oUrl);
        } catch (e) {}
      }
      var t = tUrl;
      var o = oUrl;
      if (!t) {
        try {
          t = slice64(localStorage.getItem(TENANT_KEY));
        } catch (e) {
          t = "";
        }
      }
      if (!o) {
        try {
          o = slice64(localStorage.getItem(OFFICE_KEY));
        } catch (e) {
          o = "";
        }
      }
      if (!t && !o) return;

      function isAppHtmlHref(href) {
        if (!href || /^https?:\/\//i.test(href)) return false;
        var path = href.split("#")[0].split("?")[0];
        return /\.html$/i.test(path);
      }

      document.querySelectorAll("a[href]").forEach(function (a) {
        var href = a.getAttribute("href");
        if (!isAppHtmlHref(href)) return;
        var hashI = href.indexOf("#");
        var hash = hashI >= 0 ? href.slice(hashI) : "";
        var base = hashI >= 0 ? href.slice(0, hashI) : href;
        var qI = base.indexOf("?");
        var path = qI >= 0 ? base.slice(0, qI) : base;
        var existing = qI >= 0 ? base.slice(qI + 1) : "";
        var merged = new URLSearchParams(existing);
        if (t && !merged.has("tenant")) merged.set("tenant", t);
        if (o && !merged.has("office")) merged.set("office", o);
        var mq = merged.toString();
        a.setAttribute("href", path + (mq ? "?" + mq : "") + hash);
      });
    })();
  </script>
  <script src="/pwa-register.js" defer></script>
</body>
</html>

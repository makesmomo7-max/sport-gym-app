<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタッフ向け一覧 | momo fit</title>
  <meta name="theme-color" content="#1a2b4a" />
  <style>
    :root {
      --main: #1a2b4a;
      --accent: #2e4a7a;
      --bg: #f0f3fa;
      --card: #fff;
      --muted: #5a6b85;
      --border: #d8e0ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--main);
      line-height: 1.55;
      padding: 1rem 1rem 2rem;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.15rem; margin: 0 0 0.5rem; }
    .lead { font-size: 0.82rem; color: var(--muted); margin: 0 0 1rem; }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      box-shadow: 0 3px 14px rgba(26, 43, 74, 0.06);
    }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.72rem; }
    .badge { font-size: 1.1rem; }
    a.btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.45rem 0.75rem;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .detail { display: none; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed var(--border); }
    .detail.open { display: block; }
    canvas { width: 100%; max-width: 100%; height: 100px; }
    .back { font-size: 0.82rem; color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./gym.html">← 会員ホームへ</a>
    <h1 style="margin-top:0.75rem">スタッフ向け（この端末のログ）</h1>
    <p class="lead">
      本番ではサーバー側の会員DBと権限管理が必要です。ここでは同一端末に保存された記録だけを表示し、
      <strong>状態が良くない行だけ</strong>に絞り込めるデモです。
    </p>
    <div class="card">
      <div class="row">
        <label><input type="checkbox" id="onlyWatch" checked /> 要注意（🟡🔴）のみ表示</label>
      </div>
      <table id="tbl">
        <thead>
          <tr>
            <th>会員</th>
            <th>状態</th>
            <th>最終ログ</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
      <p class="lead" style="margin:0.75rem 0 0;font-size:0.75rem">
        表示名は <code>momo_member_display_name</code>（localStorage）で変更できます。未設定の場合は「この端末の会員」です。
      </p>
    </div>
    <div class="card" id="detailCard" style="display:none">
      <h2 style="margin:0 0 0.5rem;font-size:0.95rem">個人詳細</h2>
      <p id="detailName" style="font-weight:700;margin:0 0 0.75rem"></p>
      <p style="font-size:0.78rem;color:var(--muted);margin:0 0 0.5rem">ストレス（1〜5・高いほど負荷）</p>
      <canvas id="cStress" width="600" height="120"></canvas>
      <p style="font-size:0.78rem;color:var(--muted);margin:0.85rem 0 0.5rem">睡眠満足度（1〜5）</p>
      <canvas id="cSleep" width="600" height="120"></canvas>
      <p style="font-size:0.78rem;color:var(--muted);margin:0.85rem 0 0.5rem">トレーニング完了（1=実施）</p>
      <canvas id="cTrain" width="600" height="120"></canvas>
    </div>
  </div>
  <script src="/js/wellness-core.js"></script>
  <script>
    (function () {
      function displayName() {
        try {
          var n = (localStorage.getItem("momo_member_display_name") || "").trim();
          return n || "この端末の会員";
        } catch (e) {
          return "この端末の会員";
        }
      }

      function lastLogYmd(logs) {
        if (!logs.length) return "—";
        return String(logs[logs.length - 1].date || "").slice(0, 10) || "—";
      }

      function drawLine(canvas, series, color, lo, hi) {
        var ctx = canvas.getContext("2d");
        var dpr = window.devicePixelRatio || 1;
        var w = canvas.parentElement ? canvas.parentElement.clientWidth : 300;
        canvas.width = w * dpr;
        canvas.height = 120 * dpr;
        ctx.scale(dpr, dpr);
        var W = w;
        var H = 120;
        var pad = { t: 8, r: 8, b: 18, l: 28 };
        var cW = W - pad.l - pad.r;
        var cH = H - pad.t - pad.b;
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = "#e8ecf4";
        for (var g = 0; g <= 4; g++) {
          var gy = pad.t + (cH * g) / 4;
          ctx.beginPath();
          ctx.moveTo(pad.l, gy);
          ctx.lineTo(pad.l + cW, gy);
          ctx.stroke();
        }
        var n = series.length;
        if (!n) {
          ctx.fillStyle = "#5a6b85";
          ctx.font = "12px sans-serif";
          ctx.fillText("データなし", pad.l, H / 2);
          return;
        }
        function yAt(v) {
          var t = (v - lo) / (hi - lo);
          if (t < 0) t = 0;
          if (t > 1) t = 1;
          return pad.t + cH * (1 - t);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (var i = 0; i < n; i++) {
          var x = pad.l + (n === 1 ? cW / 2 : (cW * i) / (n - 1));
          var y = yAt(series[i].v);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.fillStyle = color;
        for (var j = 0; j < n; j++) {
          var x2 = pad.l + (n === 1 ? cW / 2 : (cW * j) / (n - 1));
          var y2 = yAt(series[j].v);
          ctx.beginPath();
          ctx.arc(x2, y2, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = "#8a96ad";
        ctx.font = "9px sans-serif";
        ctx.textAlign = "center";
        var step = Math.max(1, Math.floor(n / 6));
        for (var k = 0; k < n; k += step) {
          var x3 = pad.l + (n === 1 ? cW / 2 : (cW * k) / (n - 1));
          ctx.fillText(series[k].lb || "", x3, H - 4);
        }
      }

      function openDetail() {
        var logs = window.MomoWellness.readWellnessLogs().slice(-21);
        var stress = [];
        var sleep = [];
        var train = [];
        logs.forEach(function (r) {
          var lb = String(r.date || "").slice(5);
          if (r.stress1to5 != null) stress.push({ v: +r.stress1to5, lb: lb });
          if (r.sleepSat1to5 != null) sleep.push({ v: +r.sleepSat1to5, lb: lb });
          train.push({ v: r.trainingDone ? 1 : 0, lb: String(r.date || "").slice(5) });
        });
        document.getElementById("detailCard").style.display = "block";
        document.getElementById("detailName").textContent = displayName();
        drawLine(document.getElementById("cStress"), stress, "#c62828", 1, 5);
        drawLine(document.getElementById("cSleep"), sleep, "#1565c0", 1, 5);
        drawLine(document.getElementById("cTrain"), train, "#2e7d32", 0, 1);
      }

      function render() {
        var only = document.getElementById("onlyWatch").checked;
        var logs = window.MomoWellness.readWellnessLogs();
        var risk = window.MomoWellness.computeRiskState();
        var badge = risk.level === "red" ? "🔴" : risk.level === "yellow" ? "🟡" : "🟢";
        var html = "";
        if (only && risk.level === "green") {
          html +=
            '<tr><td colspan="4" style="color:#5a6b85;font-size:0.82rem">現在、要注意の会員はいません（フィルタを外すと全員表示）。</td></tr>';
        } else {
          html +=
            "<tr><td>" +
            escapeHtml(displayName()) +
            '</td><td class="badge">' +
            badge +
            "</td><td>" +
            escapeHtml(lastLogYmd(logs)) +
            '</td><td><a href="#" class="toggleD">ログを見る</a></td></tr>';
        }
        document.getElementById("tb").innerHTML = html;
        var a = document.querySelector(".toggleD");
        if (a) {
          a.addEventListener("click", function (e) {
            e.preventDefault();
            openDetail();
            document.getElementById("detailCard").scrollIntoView({ behavior: "smooth" });
          });
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      document.getElementById("onlyWatch").addEventListener("change", render);
      render();
      window.addEventListener("resize", function () {
        if (document.getElementById("detailCard").style.display === "block") openDetail();
      });
    })();
  </script>
</body>
</html>
